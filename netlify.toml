[build]
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "http://vanhsya.com/*"
  to = "https://vanhsya.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.vanhsya.com/*"
  to = "https://vanhsya.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.vanhsya.com/*"
  to = "https://vanhsya.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://mail.vanhsya.com/*"
  to = "https://mail.privateemail.com/"
  status = 302
  force = true

[[redirects]]
  from = "https://webmail.vanhsya.com/*"
  to = "https://mail.privateemail.com/"
  status = 302
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(self), camera=(self)"
    X-XSS-Protection = "1; mode=block"
    X-Permitted-Cross-Domain-Policies = "none"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https: wss:; media-src 'self' blob: https:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; upgrade-insecure-requests"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Project Context for Netlify AI
[context]
name = "VANHSYA Global Migration Platform"
description = "Premium Next.js 16/React 19 PWA with WebGL, AI tools, Three.js for immigration services. Optimized for SSR, image opt, security headers."
tech_stack = "Next.js 16, React 19, TailwindCSS, Framer Motion, @react-three/fiber, Lucide React"
build_command = "npm ci && npm run build"
publish_dir = ".next"
deploy_notes = "Uses Netlify Next.js plugin. Monitor functions, edge images. Node 20 required."
style_guide = "Dark neo-brutalism: slate-950 bg, glassmorphism cards, grid patterns, premium typography."
