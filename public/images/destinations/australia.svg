<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none" role="img" aria-label="Australia destination">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1480" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07070B"/>
      <stop offset="0.50" stop-color="#0F1B2D"/>
      <stop offset="1" stop-color="#0A0A10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-200" y="-200" width="2000" height="1300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <pattern id="grid" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M84 0H0V84" stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="44" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1230" cy="260" r="250" fill="rgba(34,211,238,0.22)" filter="url(#glow)"/>
  <circle cx="360" cy="760" r="300" fill="rgba(168,85,247,0.16)" filter="url(#glow)"/>
  <path d="M120 320 C460 140, 900 120, 1480 340" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M140 700 C520 860, 950 860, 1460 630" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <g opacity="0.40">
    <path d="M980 620 C1060 520, 1120 520, 1200 620" stroke="rgba(255,255,255,0.14)" stroke-width="56" stroke-linecap="round"/>
    <path d="M1005 620 C1070 545, 1110 545, 1175 620" stroke="rgba(255,255,255,0.18)" stroke-width="18" stroke-linecap="round"/>
  </g>
  <rect x="120" y="120" width="1360" height="660" rx="44" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
</svg>
